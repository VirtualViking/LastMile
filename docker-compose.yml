services:
  postgres:
    image: postgres:18-alpine
    container_name: nucleo-postgres
    environment:
      POSTGRES_DB: ultimamilla_nucleo
      POSTGRES_USER: ultimamilla
      POSTGRES_PASSWORD: ultimamilla
    ports:
      - "5440:5432"
    volumes:
      - nucleo_pgdata:/var/lib/postgresql

volumes:
  nucleo_pgdata: